<main class="min-h-screen bg-slate-50 text-slate-900">
  <section class="mx-auto max-w-5xl px-4 py-10 sm:px-6 lg:px-8">
    <div class="mb-8">
      <a routerLink="/" class="text-sm font-medium text-slate-500 hover:text-slate-900">← Test kataloguna dön</a>
      <h1 class="mt-4 text-4xl font-semibold tracking-tight">{{ title() }}</h1>
      <p class="mt-3 max-w-3xl text-lg leading-8 text-slate-600">{{ config.subtitle }}</p>
      <p class="mt-4 rounded-2xl border border-slate-200 bg-white px-4 py-3 text-sm text-slate-600">
        Boş alanları bırakabilirsiniz. Sistem eksik bilgileri backend'e iletir ve gerekirse NEEDS_INFO döndürür.
      </p>
    </div>

    <form class="space-y-6 rounded-3xl border border-slate-200 bg-white p-6 shadow-sm" [formGroup]="form" (ngSubmit)="submit()">
      <div class="grid gap-4 md:grid-cols-2">
        @for (field of config.fields; track field.key) {
          <label class="block">
            <span class="mb-2 block text-sm font-semibold text-slate-800">{{ field.label }}</span>

            @switch (field.type) {
              @case ('select') {
                <select class="w-full rounded-2xl border border-slate-300 bg-white px-4 py-3 text-slate-900 outline-none transition focus:border-sky-500 focus:ring-2 focus:ring-sky-500/20" [formControlName]="field.key">
                  @for (option of field.options ?? []; track option.label + ':' + option.value) {
                    <option [ngValue]="option.value">{{ option.label }}</option>
                  }
                </select>
              }
              @case ('number') {
                <input
                  class="w-full rounded-2xl border border-slate-300 bg-white px-4 py-3 text-slate-900 outline-none transition focus:border-sky-500 focus:ring-2 focus:ring-sky-500/20"
                  [type]="field.type"
                  [min]="field.min"
                  [max]="field.max"
                  [step]="field.step ?? 1"
                  [placeholder]="field.placeholder ?? ''"
                  [formControlName]="field.key"
                />
              }
              @case ('date') {
                <input
                  class="w-full rounded-2xl border border-slate-300 bg-white px-4 py-3 text-slate-900 outline-none transition focus:border-sky-500 focus:ring-2 focus:ring-sky-500/20"
                  type="date"
                  [formControlName]="field.key"
                />
              }
              @default {
                <input
                  class="w-full rounded-2xl border border-slate-300 bg-white px-4 py-3 text-slate-900 outline-none transition focus:border-sky-500 focus:ring-2 focus:ring-sky-500/20"
                  [type]="field.type"
                  [placeholder]="field.placeholder ?? ''"
                  [formControlName]="field.key"
                />
              }
            }

            @if (field.helpText) {
              <span class="mt-2 block text-xs leading-5 text-slate-500">{{ field.helpText }}</span>
            }
          </label>
        }
      </div>

      <div class="flex flex-wrap items-center justify-between gap-4 border-t border-slate-200 pt-6">
        <button
          type="button"
          class="rounded-2xl border border-slate-300 px-4 py-3 text-sm font-semibold text-slate-700 transition hover:border-slate-400 hover:bg-slate-50 focus:outline-none focus:ring-2 focus:ring-sky-500 focus:ring-offset-2"
          (click)="reset()"
        >
          Formu sıfırla
        </button>

        <button
          type="submit"
          class="rounded-2xl bg-sky-700 px-5 py-3 text-sm font-semibold text-white transition hover:bg-sky-800 focus:outline-none focus:ring-2 focus:ring-sky-500 focus:ring-offset-2 disabled:cursor-not-allowed disabled:opacity-60"
          [disabled]="loading()"
        >
          {{ loading() ? 'Değerlendiriliyor...' : config.submitLabel }}
        </button>
      </div>

      @if (error()) {
        <div class="rounded-2xl border border-rose-200 bg-rose-50 px-4 py-3 text-sm text-rose-700" role="alert">
          {{ error() }}
        </div>
      }
    </form>

    <div class="mt-8">
      <app-result-card [result]="result()" [benefitType]="config.roadmapKey" />
      <app-explanation-panel [result]="result()" [details]="details()" />
    </div>
  </section>
</main>
